    <style>
       [v-cloak] {
          display: none;
        }
        .container {
            text-align: center;
        }

        .error {
            color: #e53935;
        }

        .success {
            color: #64dd17;
        }

        .result {
            border: 1px solid #ccc;
            padding: 0.01em 16px;
            border-radius: 16px;
            width: 48%;
            float: left;
            margin-right: 2%;
            margin-top: 10px;
            text-align: center;
            font-size: larger;
            text-transform: none;
        }
    .nav-wrapper {
          display: flex; /* Enable flexbox for the navbar */
          justify-content: space-between; /* Distribute items evenly */
          align-items: center; /* Align items vertically */
          /* Add margins to the nav-wrapper */
          margin: 0 3rem; /* Top and bottom: 0, Left and right: 2rem */
        }


    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-screen.hidden {
      display: none;
    }
    .center-align {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .radio-group {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .radio-group label {
      margin: 10px 0;
    }
    .progress-container {
      width: 100%;
      height: 50px;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: #e0e0e0;
      transition: width 0.5s ease-in-out;
      top: 0;
      left: 0;
    }

    .select-wrapper input.select-dropdown {
      padding-right: 10px;
    }


    .select-wrapper input.select-dropdown {
        text-align: right; /* Align text to the right */
    }
    .select-wrapper ul.dropdown-content {
        direction: rtl; /* Set dropdown content direction to RTL */
        text-align: right; /* Align dropdown text to the right */
    }

    canvas {
        border: 1px solid black;
    }

    .game-area {
    width: 100%;
    height: 400px;
    position: relative;
    overflow: hidden;
    }

    #drawingCanvas {
        touch-action: none;
    }

    .falling-answer {
        position: absolute;
        padding: 14px 18px;
        background-color: #f0f0f0;
        border-radius: 5px;
        cursor: pointer;
        user-select: none;
        min-width: 88px;
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
    }

    .answer-option {
        min-height: 64px;
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 12px 16px !important;
        line-height: 1.25;
        touch-action: manipulation;
    }

    .attempt-history {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }

    .attempt-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      background-color: #bdbdbd;
    }

    .attempt-dot-success {
      background-color: #4caf50;
    }

    .attempt-dot-failure {
      background-color: #e53935;
    }

    .attempt-dot-empty {
      background-color: #e0e0e0;
      opacity: 0.6;
    }

    /* Learning platformer (2D, Phaser) */
    .platformer-area {
        position: relative;
        width: 100%;
        height: 60vh;
        min-height: 320px;
        overflow: hidden;
        border-radius: 12px;
        background: #aee4ff;
        direction: ltr;
        touch-action: none;
    }

    .platformer-area canvas {
        border: none;
        display: block;
        margin: 0 auto;
    }

    .platformer-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        direction: ltr;
        gap: 12px;
        padding: 0 8px;
    }

    .platformer-dpad {
        display: flex;
        gap: 12px;
    }

    .platformer-btn {
        font-size: 28px;
        padding: 14px 26px;
        border-radius: 16px;
        border: none;
        background: #ffc107;
        box-shadow: 0 3px 0 #ff8f00;
        cursor: pointer;
        user-select: none;
        touch-action: none;
    }

    .platformer-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #ff8f00;
    }

    .platformer-jump {
        background: #81d4fa;
        box-shadow: 0 3px 0 #0288d1;
    }

    /* Balloon shooter (3D) */
    .shooter-area {
        position: relative;
        width: 100%;
        height: 65vh;
        min-height: 340px;
        overflow: hidden;
        border-radius: 12px;
        background: #87ceeb;
        direction: ltr;
        touch-action: none;
    }

    .shooter-area canvas {
        border: none;
        display: block;
    }

    /* Subtle cinematic vignette over the 3D view */
    .shooter-area::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(ellipse at center, transparent 58%, rgba(0, 0, 0, 0.28) 100%);
    }

    .shooter-area:fullscreen {
        border-radius: 0;
        height: 100vh;
    }

    .shooter-crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 30px;
        height: 30px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 5;
        filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.9));
    }

    .shooter-crosshair::before,
    .shooter-crosshair::after {
        content: '';
        position: absolute;
    }

    /* Call of Duty style crosshair: 4 ticks with a center gap */
    .shooter-crosshair::before {
        left: 50%;
        top: 0;
        width: 2px;
        height: 100%;
        transform: translateX(-50%);
        background: linear-gradient(to bottom,
            rgba(255, 255, 255, 0.95) 0 30%, transparent 30% 70%,
            rgba(255, 255, 255, 0.95) 70% 100%);
    }

    .shooter-crosshair::after {
        top: 50%;
        left: 0;
        height: 2px;
        width: 100%;
        transform: translateY(-50%);
        background: linear-gradient(to right,
            rgba(255, 255, 255, 0.95) 0 30%, transparent 30% 70%,
            rgba(255, 255, 255, 0.95) 70% 100%);
    }

    .shooter-hitmarker {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 6;
        color: #fff;
        font-size: 34px;
        font-weight: bold;
        line-height: 1;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
    }

    .shooter-hud-top {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        text-align: center;
        direction: rtl;
        max-width: 92%;
        pointer-events: none;
    }

    .shooter-question {
        display: inline-block;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        padding: 8px 24px;
        border-radius: 10px;
        font-size: 1.7rem;
        pointer-events: auto;
    }

    .shooter-question a {
        color: #fff;
    }

    .shooter-hud-message {
        margin-top: 8px;
        font-size: 1.6rem;
        font-weight: bold;
        min-height: 1.8rem;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }

    .shooter-hud-score {
        position: absolute;
        top: 12px;
        right: 14px;
        z-index: 6;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        padding: 4px 16px;
        border-radius: 8px;
        font-size: 1.4rem;
        pointer-events: none;
    }

    .shooter-fullscreen-btn {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 11;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 8px;
        padding: 5px 6px;
        cursor: pointer;
        display: flex;
    }

    .shooter-hud-progress {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 42%;
        height: 10px;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 5px;
        overflow: hidden;
        z-index: 6;
        pointer-events: none;
    }

    .shooter-hud-progress-fill {
        height: 100%;
        background: #64dd17;
        transition: width 0.4s ease;
    }

    .shooter-scope {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
        background: radial-gradient(circle at center, transparent 27%, rgba(0, 0, 0, 0.93) 29%);
    }

    .shooter-scope::before,
    .shooter-scope::after {
        content: '';
        position: absolute;
        background: rgba(0, 0, 0, 0.75);
    }

    .shooter-scope::before {
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
    }

    .shooter-scope::after {
        top: 50%;
        left: 0;
        height: 1px;
        width: 100%;
    }

    .shooter-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
        direction: rtl;
        padding: 0 16px;
    }

    .shooter-touch-controls {
        position: absolute;
        bottom: 14px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 18px;
        z-index: 10;
    }

    .shooter-touch-btn {
        opacity: 0.88;
    }

    </style>
