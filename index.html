<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Test</title>

    <!-- Material -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
       [v-cloak] {
          display: none;
        }
        .container {
            text-align: center;
        }

        .error {
            color: #e53935;
        }

        .success {
            color: #64dd17;
        }

        .result {
            border: 1px solid #ccc;
            padding: 0.01em 16px;
            border-radius: 16px;
            width: 48%;
            float: left;
            margin-right: 2%;
            margin-top: 10px;
            text-align: center;
            font-size: larger;
            text-transform: none;
        }
    .nav-wrapper {
          display: flex; /* Enable flexbox for the navbar */
          justify-content: space-between; /* Distribute items evenly */
          align-items: center; /* Align items vertically */
          /* Add margins to the nav-wrapper */
          margin: 0 3rem; /* Top and bottom: 0, Left and right: 2rem */
        }


    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loading-screen.hidden {
      display: none;
    }
    .center-align {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .radio-group {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .radio-group label {
      margin: 10px 0;
    }
    .progress-container {
      width: 100%;
      height: 50px;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: #e0e0e0;
      transition: width 0.5s ease-in-out;
      top: 0;
      left: 0;
    }

    .select-wrapper input.select-dropdown {
      padding-right: 10px;
    }


    .select-wrapper input.select-dropdown {
        text-align: right; /* Align text to the right */
    }
    .select-wrapper ul.dropdown-content {
        direction: rtl; /* Set dropdown content direction to RTL */
        text-align: right; /* Align dropdown text to the right */
    }

    canvas {
        border: 1px solid black;
    }

    .game-area {
    width: 100%;
    height: 400px;
    position: relative;
    overflow: hidden;
    }

    #drawingCanvas {
        touch-action: none;
    }

    .falling-answer {
        position: absolute;
        padding: 14px 18px;
        background-color: #f0f0f0;
        border-radius: 5px;
        cursor: pointer;
        user-select: none;
        min-width: 88px;
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
    }

    .answer-option {
        min-height: 64px;
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 12px 16px !important;
        line-height: 1.25;
        touch-action: manipulation;
    }

    /* Word Link - Tetris-style well: drag a line from an exposed block to its match */
    .wl-area {
        position: relative;
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        height: 66vh;
        min-height: 380px;
        overflow: hidden;
        border-radius: 12px;
        border: 4px solid #2a3550;
        background:
            repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 33.33%),
            linear-gradient(#1b2440, #243056);
        touch-action: none;
        user-select: none;
    }

    .wl-svg {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 3;
    }

    .wl-token {
        position: absolute;
        box-sizing: border-box;
        padding: 2px 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: grab;
        z-index: 4;
        text-align: center;
        line-height: 1.05;
        overflow: hidden;
    }

    .wl-faller {
        border: 3px solid #ffb300;
        color: #4e342e;
    }

    /* Only the exposed (top of stack) question can be answered - it glows */
    .wl-exposed {
        background: linear-gradient(#ffe082, #ffb300);
        border: 3px solid #ff8f00;
        color: #4e342e;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.55), 0 0 0 3px rgba(255, 193, 7, 0.5);
        z-index: 5;
    }

    .wl-buried {
        background: linear-gradient(#6b7286, #4a516b);
        border: 3px solid #39405a;
        color: #cdd3e4;
        opacity: 0.85;
        cursor: default;
    }

    .wl-target {
        background: linear-gradient(#a5f0a8, #43a047);
        border: 3px solid #2e7d32;
        color: #0d3d12;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.45);
    }

    .wl-burst {
        position: absolute;
        z-index: 6;
        font-size: 44px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: wl-pop 0.6s ease-out forwards;
    }

    .wl-over {
        position: absolute;
        inset: 0;
        z-index: 8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(15, 20, 40, 0.82);
        color: #fff;
    }

    .wl-over-title {
        font-size: 30px;
        font-weight: bold;
    }

    .wl-restart {
        font-size: 20px;
        font-weight: bold;
        padding: 12px 28px;
        border: none;
        border-radius: 14px;
        background: #ffb300;
        color: #3e2723;
        box-shadow: 0 4px 0 #ff8f00;
        cursor: pointer;
    }

    .wl-restart:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #ff8f00;
    }

    @keyframes wl-pop {
        0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    }

    .attempt-history {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }

    .attempt-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      background-color: #bdbdbd;
    }

    .attempt-dot-success {
      background-color: #4caf50;
    }

    .attempt-dot-failure {
      background-color: #e53935;
    }

    .attempt-dot-empty {
      background-color: #e0e0e0;
      opacity: 0.6;
    }

    /* Learning platformer (2D, Phaser) */
    .platformer-area {
        position: relative;
        width: 100%;
        height: 60vh;
        min-height: 320px;
        overflow: hidden;
        border-radius: 12px;
        background: #aee4ff;
        direction: ltr;
        touch-action: none;
    }

    .platformer-area canvas {
        border: none;
        display: block;
        margin: 0 auto;
    }

    .platformer-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        direction: ltr;
        gap: 12px;
        padding: 0 8px;
    }

    .platformer-dpad {
        display: flex;
        gap: 12px;
    }

    .platformer-btn {
        font-size: 28px;
        padding: 14px 26px;
        border-radius: 16px;
        border: none;
        background: #ffc107;
        box-shadow: 0 3px 0 #ff8f00;
        cursor: pointer;
        user-select: none;
        touch-action: none;
    }

    .platformer-btn:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #ff8f00;
    }

    .platformer-jump {
        background: #81d4fa;
        box-shadow: 0 3px 0 #0288d1;
    }

    .platformer-down {
        background: #b39ddb;
        box-shadow: 0 3px 0 #673ab7;
    }

    /* Balloon shooter (3D) */
    .shooter-area {
        position: relative;
        width: 100%;
        height: 65vh;
        min-height: 340px;
        overflow: hidden;
        border-radius: 10px;
        background: #87ceeb;
        box-shadow: 0 16px 42px rgba(10, 22, 34, 0.28);
        direction: ltr;
        touch-action: none;
    }

    .shooter-area canvas {
        border: none;
        display: block;
    }

    /* Subtle cinematic vignette over the 3D view */
    .shooter-area::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 4;
        background:
            linear-gradient(to bottom, rgba(255, 255, 255, 0.08), transparent 20%, transparent 72%, rgba(7, 12, 18, 0.18)),
            radial-gradient(ellipse at center, transparent 52%, rgba(0, 0, 0, 0.36) 100%);
    }

    .shooter-area:fullscreen {
        border-radius: 0;
        height: 100vh;
    }

    .shooter-crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 30px;
        height: 30px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 5;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 50%;
        filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.9));
    }

    .shooter-crosshair::before,
    .shooter-crosshair::after {
        content: '';
        position: absolute;
    }

    /* Call of Duty style crosshair: 4 ticks with a center gap */
    .shooter-crosshair::before {
        left: 50%;
        top: 0;
        width: 2px;
        height: 100%;
        transform: translateX(-50%);
        background: linear-gradient(to bottom,
            rgba(255, 255, 255, 0.95) 0 30%, transparent 30% 70%,
            rgba(255, 255, 255, 0.95) 70% 100%);
    }

    .shooter-crosshair::after {
        top: 50%;
        left: 0;
        height: 2px;
        width: 100%;
        transform: translateY(-50%);
        background: linear-gradient(to right,
            rgba(255, 255, 255, 0.95) 0 30%, transparent 30% 70%,
            rgba(255, 255, 255, 0.95) 70% 100%);
    }

    .shooter-hitmarker {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 6;
        color: #fff;
        font-size: 34px;
        font-weight: bold;
        line-height: 1;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
    }

    .shooter-hud-top {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        text-align: center;
        direction: rtl;
        max-width: 92%;
        pointer-events: none;
    }

    .shooter-question {
        display: inline-block;
        background: linear-gradient(180deg, rgba(10, 18, 28, 0.76), rgba(5, 8, 14, 0.58));
        color: #fff;
        padding: 8px 24px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        font-size: 1.7rem;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
        pointer-events: auto;
    }

    .shooter-question a {
        color: #fff;
    }

    .shooter-hud-message {
        margin-top: 8px;
        font-size: 1.6rem;
        font-weight: bold;
        min-height: 1.8rem;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }

    .shooter-hud-score {
        position: absolute;
        top: 12px;
        right: 14px;
        z-index: 6;
        color: #fff;
        background: linear-gradient(180deg, rgba(10, 18, 28, 0.78), rgba(5, 8, 14, 0.62));
        padding: 4px 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        font-size: 1.4rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        pointer-events: none;
    }

    .shooter-hud-ammo {
        position: absolute;
        right: 14px;
        bottom: 32px;
        z-index: 6;
        min-width: 118px;
        padding: 7px 12px 6px;
        color: #fff;
        background: linear-gradient(180deg, rgba(10, 18, 28, 0.82), rgba(5, 8, 14, 0.68));
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        pointer-events: none;
        text-align: left;
        direction: ltr;
        font-family: Arial, sans-serif;
    }

    .shooter-ammo-current {
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1;
    }

    .shooter-ammo-separator,
    .shooter-ammo-mag {
        font-size: 1rem;
        opacity: 0.78;
    }

    .shooter-ammo-reserve {
        float: right;
        margin-top: 6px;
        padding-left: 10px;
        color: #ffd54f;
        font-size: 0.95rem;
        font-weight: 700;
    }

    .shooter-ammo-state {
        display: block;
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.72rem;
        letter-spacing: 0;
    }

    .shooter-hud-ammo.empty .shooter-ammo-current {
        color: #ff5252;
    }

    .shooter-hud-ammo.reloading .shooter-ammo-current,
    .shooter-hud-ammo.reloading .shooter-ammo-state {
        color: #ffd54f;
    }

    .shooter-hud-gun {
        position: absolute;
        left: 14px;
        bottom: 32px;
        z-index: 6;
        color: #fff;
        background: linear-gradient(180deg, rgba(10, 18, 28, 0.82), rgba(5, 8, 14, 0.68));
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 1.05rem;
        font-weight: 700;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        cursor: pointer;
        direction: rtl;
    }

    .shooter-gun-hint {
        margin-right: 8px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.72rem;
        font-weight: 400;
    }

    .shooter-fullscreen-btn {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 11;
        color: #fff;
        background: linear-gradient(180deg, rgba(10, 18, 28, 0.78), rgba(5, 8, 14, 0.62));
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 5px 6px;
        cursor: pointer;
        display: flex;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .shooter-hud-progress {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 42%;
        height: 10px;
        background: rgba(5, 8, 14, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        overflow: hidden;
        z-index: 6;
        pointer-events: none;
    }

    .shooter-hud-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #64dd17, #ffd54f);
        box-shadow: 0 0 12px rgba(100, 221, 23, 0.75);
        transition: width 0.4s ease;
    }

    .shooter-scope {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
        background:
            radial-gradient(circle at center, transparent 24%, rgba(255, 255, 255, 0.12) 24.5%, transparent 25.5%),
            radial-gradient(circle at center, transparent 27%, rgba(0, 0, 0, 0.94) 29%);
    }

    .shooter-scope::before,
    .shooter-scope::after {
        content: '';
        position: absolute;
        background: rgba(0, 0, 0, 0.75);
    }

    .shooter-scope::before {
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
    }

    .shooter-scope::after {
        top: 50%;
        left: 0;
        height: 1px;
        width: 100%;
    }

    .shooter-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background:
            radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 38%),
            rgba(3, 8, 13, 0.72);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
        direction: rtl;
        padding: 0 16px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.75);
    }

    .shooter-touch-controls {
        position: absolute;
        bottom: 14px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 18px;
        z-index: 10;
    }

    .shooter-touch-btn {
        opacity: 0.88;
    }

    /* Treasure maze (3D) — builds on the shooter-* HUD classes */
    .maze-area {
        background: #0a0e1f;
    }

    .maze-fade {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        pointer-events: none;
        z-index: 7;
    }

    .maze-scenario {
        display: inline-block;
        background: rgba(0, 0, 0, 0.45);
        color: #ffd54f;
        padding: 2px 16px;
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 1.15rem;
    }

    .maze-gems {
        margin-right: 14px;
    }

    </style>
</head>

        <nav :style="{ background: theme.colors.primary }">
            <div class="nav-wrapper">

            <ul class="right">
            <li><a><router-link to="/user"><span  v-if="username" >היי, {{ username }}</span></router-link></a></li>
            </ul>
        </div>
    </nav>
    <p><router-view @theme-changed="updateTheme"></router-view></p>
</div>
