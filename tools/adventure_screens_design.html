<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>עיצוב מסכי ההרפתקה</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Segoe UI','Assistant','Arial Hebrew',sans-serif;
    background:#0b0d16;color:var(--ink);overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  :root{
    --primary:#006064;--secondary:#78909c;--tertiary:#B0E0E6;--accent:#C0C0C0;
    --bg:#F5F5F5;--bg2:#dfeef0;--ink:#08343a;--muted:#8aa2a6;
    --panel:rgba(255,255,255,.72);--panelStrong:rgba(255,255,255,.9);
    --line:rgba(0,0,0,.12);--onAccent:#26210a;--glowA:rgba(192,192,192,.55);
  }

  /* ---------- preview chrome ---------- */
  #chrome{
    position:fixed;top:0;left:0;right:0;height:46px;z-index:50;direction:rtl;
    display:flex;align-items:center;gap:14px;padding:0 16px;
    background:rgba(10,12,20,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);color:#eef;font-size:13px;
  }
  #chrome .grp{display:flex;align-items:center;gap:6px}
  #chrome .lbl{opacity:.55;font-weight:700;font-size:11px;letter-spacing:.02em}
  #chrome button{
    font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;color:#dde;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);
    border-radius:9px;padding:6px 11px;line-height:1;transition:.15s;
  }
  #chrome button:hover{background:rgba(255,255,255,.16)}
  #chrome button.on{background:rgba(255,255,255,.95);color:#111;border-color:#fff}
  #chrome .sp{flex:1}
  #chrome .tag{opacity:.5;font-size:11px}

  /* ---------- stage ---------- */
  #stage{position:fixed;inset:46px 0 0 0;overflow:hidden;background:var(--bg)}
  #bg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  #bg svg{width:100%;height:100%;display:block}
  #veil{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 8%, transparent 55%, rgba(0,0,0,var(--vig,.14)) 100%)}

  #fg{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;direction:rtl}

  /* ---------- HUD ---------- */
  #hud{display:flex;align-items:center;gap:12px;padding:14px 22px 8px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:15px;
    padding:7px 13px 7px 11px;border-radius:999px;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);
    box-shadow:0 4px 14px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.5);
    backdrop-filter:blur(6px);
  }
  .pill .ic{font-size:17px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.25))}
  .pill.coin{color:var(--onAccent);background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 70%,#000 6%));border-color:rgba(0,0,0,.14)}
  .titlewrap{flex:1;text-align:center;min-width:0}
  .titlewrap h1{font-size:23px;font-weight:900;letter-spacing:-.01em;line-height:1.1;
    text-shadow:0 1px 0 rgba(255,255,255,.35),0 2px 12px rgba(0,0,0,.12)}
  .titlewrap p{font-size:12.5px;font-weight:700;opacity:.72;margin-top:2px}
  .gear{width:42px;height:42px;flex:none;border-radius:50%;cursor:pointer;border:1px solid var(--line);
    background:var(--panel);font-size:19px;display:grid;place-items:center;color:var(--ink);
    box-shadow:0 4px 14px rgba(0,0,0,.1);text-decoration:none}
  .gear:hover{filter:brightness(1.05)}
  [data-dark] .titlewrap h1{text-shadow:0 2px 18px rgba(0,0,0,.6)}
  [data-dark] .pill{box-shadow:0 4px 16px rgba(0,0,0,.4)}

  #content{flex:1;position:relative;overflow:hidden}

  /* ============ OVERVIEW · DIRECTION 1 — STORYBOOK GALLERY ============ */
  .gallery{position:absolute;inset:0;padding:6px 26px 20px;overflow:auto;direction:rtl}
  .gwrap{max-width:1120px;margin:0 auto;
    display:grid;grid-template-columns:repeat(4,1fr);gap:20px 20px;align-items:stretch}
  .card{position:relative;border-radius:20px;cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease;
    animation:cardIn .5s cubic-bezier(.2,.9,.3,1.2) both}
  .card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
  .card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}
  .card:nth-child(6){animation-delay:.25s}.card:nth-child(7){animation-delay:.3s}
  .card:nth-child(8){animation-delay:.35s}
  @keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-3px)}
  .frame{position:relative;border-radius:20px;overflow:hidden;
    background:
      linear-gradient(180deg, color-mix(in srgb,var(--tertiary) 78%,#fff) 0%, color-mix(in srgb,var(--primary) 42%,var(--tertiary)) 100%);
    border:3px solid var(--panelStrong);
    box-shadow:0 10px 26px rgba(0,0,0,.18), inset 0 2px 0 rgba(255,255,255,.5), inset 0 -30px 40px rgba(0,0,0,.10);
    aspect-ratio:1/.9;display:grid;place-items:center}
  .frame::after{content:"";position:absolute;inset:0;border-radius:17px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.25), inset 0 0 44px rgba(0,0,0,.12);pointer-events:none}
  .frame .scene{position:absolute;inset:0;display:grid;place-items:center}
  .frame .worldEmoji{font-size:74px;line-height:1;filter:drop-shadow(0 8px 10px rgba(0,0,0,.28));
    transform:translateY(-4px);animation:bob 4.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(-4px)}50%{transform:translateY(-11px)}}
  .frame .prop{position:absolute;font-size:24px;opacity:.9;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25))}
  .frame .p1{top:16px;left:16px;font-size:20px;animation:floaty 6s ease-in-out infinite}
  .frame .p2{bottom:20px;right:16px;font-size:18px;animation:floaty 5s ease-in-out .6s infinite}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-7px) rotate(5deg)}}
  .frame .ground{position:absolute;left:12%;right:12%;bottom:16px;height:14px;border-radius:50%;
    background:radial-gradient(closest-side, rgba(0,0,0,.32), transparent)}
  .numbadge{position:absolute;top:-9px;right:14px;z-index:3;width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center;font-weight:900;font-size:14px;color:var(--onAccent);
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 92%,#fff),var(--accent));
    border:2px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.28)}
  .plate{position:relative;margin:10px auto 0;width:92%;padding:8px 10px 9px;border-radius:13px;text-align:center;
    background:var(--panelStrong);border:1px solid var(--line);
    box-shadow:0 6px 14px rgba(0,0,0,.14)}
  .plate .wname{font-weight:800;font-size:14.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stars{display:flex;justify-content:center;gap:3px;margin-top:4px;font-size:13px;line-height:1}
  .stars .s{color:var(--accent);filter:drop-shadow(0 1px 0 rgba(0,0,0,.25))}
  .stars .s.off{color:color-mix(in srgb,var(--ink) 22%,transparent)}
  .ribbon{position:absolute;top:10px;left:-2px;z-index:3;font-weight:900;font-size:11px;color:#1c4d1e;
    background:linear-gradient(180deg,#bff0b0,#8fdd82);padding:4px 12px 4px 9px;border-radius:0 999px 999px 0;
    box-shadow:0 3px 8px rgba(0,0,0,.25)}
  /* current */
  .card.current .frame{border-color:var(--accent);
    box-shadow:0 0 0 4px var(--glowA),0 16px 34px rgba(0,0,0,.26), inset 0 2px 0 rgba(255,255,255,.5)}
  .card.current{transform:scale(1.04)}
  .card.current:hover{transform:scale(1.04) translateY(-3px)}
  .glowring{position:absolute;inset:-10px;border-radius:26px;z-index:0;
    box-shadow:0 0 40px 4px var(--glowA);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .pennant{position:absolute;top:-16px;left:50%;transform:translateX(-50%);z-index:4;
    font-weight:900;font-size:12px;color:var(--onAccent);white-space:nowrap;
    background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 92%,#fff),var(--accent));
    padding:5px 12px;border-radius:999px;border:2px solid #fff;box-shadow:0 5px 12px rgba(0,0,0,.3)}
  .hero{position:absolute;bottom:8px;left:10px;z-index:4;font-size:34px;
    filter:drop-shadow(0 5px 5px rgba(0,0,0,.4));animation:heroBob 1.5s ease-in-out infinite}
  @keyframes heroBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .progpill{margin-top:5px;display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;
    color:var(--ink)}
  .progbar{width:74px;height:8px;border-radius:99px;background:color-mix(in srgb,var(--ink) 14%,transparent);overflow:hidden}
  .progbar i{display:block;height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--primary),var(--accent))}
  /* locked */
  .card.locked{cursor:default}
  .card.locked .frame{filter:grayscale(.72) brightness(.92)}
  .card.locked .frame::before{content:"";position:absolute;inset:0;z-index:2;
    background:linear-gradient(180deg,rgba(30,34,44,.30),rgba(20,22,30,.5))}
  .card.locked .worldEmoji{opacity:.45}
  .lock{position:absolute;inset:0;z-index:3;display:grid;place-items:center;font-size:40px;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.5))}
  .card.locked .plate{opacity:.85}
  .card.locked .numbadge{filter:grayscale(1);color:#333}

  /* ============ OVERVIEW · DIRECTION 2 — ADVENTURE BOARD ============ */
  .boardWrap{position:absolute;inset:0;display:grid;place-items:center;padding:4px 18px 16px}
  .boardWrap svg{width:100%;height:100%;max-width:1160px}

  /* ============ SCREEN B — QUEST TIMELINE ============ */
  .questScroll{position:absolute;inset:0;overflow:auto;direction:rtl}
  .quest{position:relative;max-width:780px;margin:0 auto;padding:6px 20px 26px}
  .goalCard{position:relative;margin:0 auto 2px;max-width:540px;border-radius:16px;padding:11px 18px;
    display:flex;align-items:center;gap:15px;text-align:right;
    color:var(--onAccent);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 90%,#fff),var(--accent));
    border:2px solid #fff;box-shadow:0 10px 24px rgba(0,0,0,.25)}
  .goalCard .g-emoji{font-size:36px;flex:none;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))}
  .goalCard .gtext{flex:1;min-width:0}
  .goalCard h2{font-size:17px;font-weight:900;line-height:1.1}
  .goalCard .meter{margin:6px 0 0;height:9px;border-radius:99px;background:rgba(0,0,0,.22);overflow:hidden}
  .goalCard .meter i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#fff,color-mix(in srgb,#fff 60%,var(--primary)))}
  .goalCard .msub{font-size:11.5px;font-weight:800;opacity:.85;margin-top:4px}

  .spine{position:absolute;top:128px;bottom:64px;right:50%;transform:translateX(50%);width:16px;z-index:0}
  .spine .track{position:absolute;inset:0;border-radius:99px;
    background:repeating-linear-gradient(180deg,color-mix(in srgb,var(--ink) 24%,transparent) 0 6px, transparent 6px 16px)}
  .spine .fill{position:absolute;left:0;right:0;top:0;border-radius:99px;
    background:linear-gradient(180deg,var(--primary),var(--accent));box-shadow:0 0 16px 2px var(--glowA)}

  .step{position:relative;z-index:2;display:grid;grid-template-columns:1fr 62px 1fr;column-gap:16px;
    align-items:center;margin:11px 0;min-height:64px;
    animation:stepIn .45s cubic-bezier(.2,.9,.3,1.15) both}
  .step .bodycell{display:flex}
  .step.right .bodycell{grid-column:1;justify-content:flex-end}
  .step.left  .bodycell{grid-column:3;justify-content:flex-start}
  .step .node{grid-column:2;justify-self:center}
  .step:nth-child(2){animation-delay:.05s}.step:nth-child(3){animation-delay:.1s}
  .step:nth-child(4){animation-delay:.15s}.step:nth-child(5){animation-delay:.2s}
  .step:nth-child(6){animation-delay:.25s}
  @keyframes stepIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .node{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;font-size:26px;z-index:3;
    background:radial-gradient(circle at 38% 30%, color-mix(in srgb,var(--tertiary) 70%,#fff), var(--primary));
    border:4px solid var(--panelStrong);box-shadow:0 8px 18px rgba(0,0,0,.28);position:relative}
  .ecard{position:relative;min-width:210px;max-width:270px;padding:12px 15px;border-radius:15px;
    background:var(--panelStrong);border:1px solid var(--line);
    box-shadow:0 8px 20px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.5)}
  .ecard .etype{font-size:11px;font-weight:800;opacity:.62;letter-spacing:.02em}
  .ecard .ename{font-size:15.5px;font-weight:900;color:var(--ink);margin-top:1px;line-height:1.15}
  .ecard .erow{display:flex;align-items:center;gap:8px;margin-top:6px}
  .ecard .stars{justify-content:flex-start}
  .badge-done{color:#1c7a2e;font-weight:900;font-size:12.5px}
  .step.done .node{background:radial-gradient(circle at 38% 30%, #cfe9c8, #6bbf6e);border-color:#eafaea}
  .step.locked .node{filter:grayscale(.6);background:radial-gradient(circle at 38% 30%,#c4c8ce,#7c828b)}
  .step.locked .ecard{opacity:.72}
  .step.locked .ename{color:var(--muted)}
  .step.current .node{border-color:var(--accent);box-shadow:0 0 0 5px var(--glowA),0 8px 20px rgba(0,0,0,.3);
    animation:nodePulse 1.7s ease-in-out infinite}
  @keyframes nodePulse{0%,100%{box-shadow:0 0 0 4px var(--glowA),0 8px 20px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 10px color-mix(in srgb,var(--accent) 30%,transparent),0 8px 20px rgba(0,0,0,.3)}}
  .step.current .ecard{border-color:var(--accent);box-shadow:0 0 0 2px var(--glowA),0 12px 26px rgba(0,0,0,.22)}
  .heroTok{position:absolute;top:-30px;right:50%;transform:translateX(50%);font-size:30px;z-index:5;
    filter:drop-shadow(0 5px 4px rgba(0,0,0,.4));animation:heroBob 1.4s ease-in-out infinite}
  .cta{display:inline-block;margin-top:7px;font-weight:900;font-size:13px;padding:6px 15px;border-radius:99px;
    color:var(--onAccent);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 90%,#fff),var(--accent));
    border:2px solid #fff;box-shadow:0 5px 12px rgba(0,0,0,.25)}
  .startTag{text-align:center;margin-top:6px;font-weight:800;font-size:12.5px;opacity:.7}
  .backBtn{position:absolute;left:22px;bottom:18px;z-index:6;font:inherit;font-weight:800;font-size:13.5px;cursor:pointer;
    color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:9px 16px;
    box-shadow:0 5px 14px rgba(0,0,0,.14);backdrop-filter:blur(6px);text-decoration:none;display:inline-flex;gap:6px;align-items:center}
  .backBtn:hover{filter:brightness(1.05)}
  [data-dark] .ecard,[data-dark] .plate,[data-dark] .goalCard{border-color:rgba(255,255,255,.12)}
</style>
</head>
<body data-light>
<div id="chrome">
  <span class="lbl">ערכה</span>
  <div class="grp" id="themeBtns"></div>
  <span class="lbl" style="margin-right:8px">מסך</span>
  <div class="grp" id="screenBtns">
    <button data-screen="overview">מפת העולמות</button>
    <button data-screen="path">מסלול העולם</button>
  </div>
  <span class="lbl" id="dirLbl" style="margin-right:8px">כיוון</span>
  <div class="grp" id="dirBtns">
    <button data-dir="1">① גלריית פרקים</button>
    <button data-dir="2">② לוח משחק</button>
  </div>
  <span class="sp"></span>
  <span class="tag">תצוגה מקדימה · עיצוב</span>
</div>

<div id="stage">
  <div id="bg"></div>
  <div id="veil"></div>
  <div id="fg">
    <header id="hud"></header>
    <div id="content"></div>
  </div>
</div>

<script>
/* ============================ palettes ============================ */
const THEMES = {
  base:    {name:'בסיסי',   emoji:'🧭', light:true,
            primary:'#006064',secondary:'#78909c',tertiary:'#B0E0E6',accent:'#3fb6c2',accentAlt:'#C0C0C0',
            bg:'#eef6f6',bg2:'#cfe6e8',ink:'#08343a',muted:'#6f9296',onAccent:'#04252a'},
  soldiers:{name:'חיילים',  emoji:'🪖', light:true,
            primary:'#4B5320',secondary:'#8a8f5c',tertiary:'#BDB76B',accent:'#e8b833',accentAlt:'#FFD700',
            bg:'#eae7cf',bg2:'#d3d1a8',ink:'#2b2f16',onAccent:'#2b2408',muted:'#7d7a52'},
  unicorn: {name:'חד קרן',  emoji:'🦄', light:true,
            primary:'#FF69B4',secondary:'#BA55D3',tertiary:'#FFB6C1',accent:'#f6b93b',accentAlt:'#FFD700',
            bg:'#fff0f6',bg2:'#ffd7ec',ink:'#5a1470',onAccent:'#5a3800',muted:'#c07aa8'},
  space:   {name:'חלל',     emoji:'👩‍🚀', light:false,
            primary:'#1E90FF',secondary:'#3a2f8f',tertiary:'#87CEEB',accent:'#FFD700',accentAlt:'#FFD700',
            bg:'#05061f',bg2:'#0a0f3a',ink:'#eaf2ff',onAccent:'#2b2408',muted:'#7d8bb8'},
  dark:    {name:'כהה',     emoji:'🧙', light:false,
            primary:'#4a3d63',secondary:'#1E1E1E',tertiary:'#2F4F4F',accent:'#BB86FC',accentAlt:'#BB86FC',
            bg:'#141018',bg2:'#0b0810',ink:'#E0E0E0',onAccent:'#20143a',muted:'#8b83a0'},
};

/* per-theme flavour */
const FL = {
  base:    {hero:'🧭', part:'bubble', props:['⛵','🐚'], gGoal:'🏝️',
            oTitle:'מפת העולמות', oSub:'בחרו יבשת והפליגו להרפתקה', scenery:'sea'},
  soldiers:{hero:'🎖️', part:'ember', props:['🚩','⛺'], gGoal:'🏰',
            oTitle:'מפת המבצע', oSub:'כבשו טריטוריה אחר טריטוריה', scenery:'hills'},
  unicorn: {hero:'🦄', part:'petal', props:['🍬','⭐'], gGoal:'🏰',
            oTitle:'ממלכות הקסם', oSub:'טיילו בין הממלכות המתוקות', scenery:'candy'},
  space:   {hero:'🚀', part:'star', props:['🪐','⭐'], gGoal:'🛰️',
            oTitle:'מפת הגלקסיה', oSub:'נווטו מכוכב לכוכב', scenery:'space'},
  dark:    {hero:'🕯️', part:'firefly', props:['🗝️','🦇'], gGoal:'🔮',
            oTitle:'ממלכת הצללים', oSub:'חצו את החדרים האפלים', scenery:'shadow'},
};

/* worlds (ordered, sequential unlock) */
const WORLDS = [
  {name:'אותיות א׳–ה׳', emoji:'א',  state:'done',    stars:3, prog:'5/5', p:1},
  {name:'אותיות ו׳–י׳', emoji:'ו',  state:'done',    stars:3, prog:'5/5', p:1},
  {name:'אותיות כ׳–מ׳', emoji:'כ',  state:'done',    stars:2, prog:'5/5', p:1},
  {name:'אותיות נ׳–ע׳', emoji:'נ',  state:'current', stars:0, prog:'3/5', p:0.6},
  {name:'אותיות פ׳–ק׳', emoji:'פ',  state:'locked',  stars:0, prog:'0/5', p:0},
  {name:'אותיות ר׳–ת׳', emoji:'ר',  state:'locked',  stars:0, prog:'0/6', p:0},
  {name:'ארץ כל האותיות',emoji:'📜', state:'locked',  stars:0, prog:'0/6', p:0},
  {name:'עולם הצבעים',   emoji:'🌈', state:'locked',  stars:0, prog:'0/5', p:0},
];

/* level steps for the current world */
const STEPS = [
  {type:'learn', icon:'📖', name:'לומדים אותיות חדשות', state:'done',    stars:3},
  {type:'game',  icon:'🎯', name:'מבוך האוצר',          state:'done',    stars:3},
  {type:'game',  icon:'🍃', name:'תשובות נופלות',       state:'done',    stars:2},
  {type:'game',  icon:'🗝️', name:'מבוך האוצר',          state:'current', stars:0},
  {type:'final', icon:'👑', name:'האתגר הגדול',         state:'locked',  stars:0},
];
const TYPE_LABEL={learn:'לומדים משהו חדש',game:'מיני-משחק',final:'האתגר הגדול'};

/* ============================ helpers ============================ */
function toRGB(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return[(n>>16)&255,(n>>8)&255,n&255];}
function A(h,a){const[r,g,b]=toRGB(h);return`rgba(${r},${g},${b},${a})`;}
function shade(h,p){let[r,g,b]=toRGB(h);const f=p<0?0:255,t=Math.abs(p);r=Math.round(r+(f-r)*t);g=Math.round(g+(f-g)*t);b=Math.round(b+(f-b)*t);return`#${((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}`;}
const rnd=(s)=>{let x=Math.sin(s)*10000;return x-Math.floor(x);};
const W=1280,H=760;

/* stars markup (HTML) */
function starsHTML(n){let s='';for(let i=0;i<3;i++)s+=`<span class="s ${i<n?'':'off'}">★</span>`;return`<div class="stars">${s}</div>`;}

/* ============================ scenery (SVG background) ============================ */
function starsField(seed,count,color,maxR){let s='';for(let i=0;i<count;i++){const x=rnd(seed+i)*W,y=rnd(seed+i*1.7)*H,r=0.4+rnd(seed+i*2.3)*maxR,o=0.25+rnd(seed+i*3.1)*0.7;s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${color}" opacity="${o.toFixed(2)}"/>`;}return s;}
function hillBand(yTop,amp,color,phase,op){let d=`M0 ${yTop}`;for(let x=0;x<=W;x+=36){const y=yTop+Math.sin((x/W*Math.PI*2)+phase)*amp;d+=` L${x} ${y.toFixed(1)}`;}d+=` L${W} ${H} L0 ${H} Z`;return`<path d="${d}" fill="${color}" opacity="${op==null?1:op}"/>`;}
function cloud(x,y,s,c){return`<g transform="translate(${x},${y}) scale(${s})" fill="${c}"><ellipse cx="0" cy="0" rx="46" ry="26"/><ellipse cx="34" cy="6" rx="34" ry="22"/><ellipse cx="-34" cy="8" rx="30" ry="20"/><ellipse cx="12" cy="-14" rx="28" ry="20"/></g>`;}
function dune(yTop,amp,color,phase,op){return hillBand(yTop,amp,color,phase,op);}

function particles(kind,c){
  const n=kind==='star'?34:16;let s='';
  for(let i=0;i<n;i++){
    const x=(rnd(i*1.3+kind.length)*W).toFixed(0),y=(rnd(i*2.7+7)*H).toFixed(0);
    const dur=(5+rnd(i)*7).toFixed(1),del=(-rnd(i*3)*8).toFixed(1);
    if(kind==='star'){const r=(0.6+rnd(i)*1.6).toFixed(1);s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="#fff"><animate attributeName="opacity" values="0.15;1;0.15" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/></circle>`;}
    else if(kind==='firefly'){s+=`<circle cx="${x}" cy="${y}" r="2.3" fill="${c.accent}" filter="url(#soft)"><animate attributeName="opacity" values="0;1;0" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/><animate attributeName="cy" values="${y};${(+y-40)}" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/></circle>`;}
    else if(kind==='petal'){const col=['#ffd1ec','#ffb3d9','#fff0a6','#d9b3ff'][i%4],deg=(rnd(i)*360)|0;s+=`<ellipse cx="${x}" cy="${y}" rx="6" ry="3" fill="${col}" opacity=".85" transform="rotate(${deg} ${x} ${y})"><animate attributeName="cy" values="${y};${(+y+150)}" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.9;0" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/></ellipse>`;}
    else if(kind==='ember'){s+=`<circle cx="${x}" cy="${y}" r="${(1+rnd(i)*1.5).toFixed(1)}" fill="${A(c.accent,.9)}"><animate attributeName="cy" values="${y};${(+y-55)}" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.85;0" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/></circle>`;}
    else{s+=`<circle cx="${x}" cy="${y}" r="${(3+rnd(i)*5).toFixed(1)}" fill="none" stroke="${A('#ffffff',.5)}"><animate attributeName="cy" values="${y};${(+y-60)}" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.7;0" dur="${dur}s" begin="${del}s" repeatCount="indefinite"/></circle>`;}
  }
  return`<g>${s}</g>`;
}

function sceneryDefs(c){
  return`<defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.2"/></filter>
    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">${c.skyStops}</linearGradient>
  </defs>`;
}

function buildScenery(key,screen){
  const t=THEMES[key],fl=FL[key];
  const c={primary:t.primary,secondary:t.secondary,tertiary:t.tertiary,accent:t.accent};
  // sky stops per theme
  const stops={
    sea:`<stop offset="0" stop-color="${shade(t.tertiary,.45)}"/><stop offset="55%" stop-color="${shade(t.tertiary,.12)}"/><stop offset="100%" stop-color="${shade(t.primary,.32)}"/>`,
    hills:`<stop offset="0" stop-color="${shade(t.tertiary,.4)}"/><stop offset="50%" stop-color="${shade(t.secondary,.35)}"/><stop offset="100%" stop-color="${shade(t.primary,.28)}"/>`,
    candy:`<stop offset="0" stop-color="#ffe6f4"/><stop offset="50%" stop-color="#ffcbe6"/><stop offset="100%" stop-color="#e6c4ff"/>`,
    space:`<stop offset="0" stop-color="#101a52"/><stop offset="55%" stop-color="#060a2a"/><stop offset="100%" stop-color="#02030f"/>`,
    shadow:`<stop offset="0" stop-color="#241a33"/><stop offset="60%" stop-color="#140f1c"/><stop offset="100%" stop-color="#0a070e"/>`,
  }[fl.scenery];
  c.skyStops=stops;
  let sky=`<rect width="${W}" height="${H}" fill="url(#sky)"/>`;
  let far='',mid='',near='';

  if(fl.scenery==='space'){
    sky+=`<ellipse cx="960" cy="120" rx="540" ry="320" fill="${A(t.secondary,.5)}" filter="url(#blurBig)"/>`+
         `<ellipse cx="230" cy="80" rx="360" ry="240" fill="${A('#7a3bd6',.4)}" filter="url(#blurBig)"/>`+
         `<ellipse cx="640" cy="560" rx="640" ry="260" fill="${A(t.primary,.24)}" filter="url(#blurBig)"/>`;
    far=starsField(3,150,'#ffffff',1.6)+starsField(9,46,t.tertiary,1.2);
    mid=`<g filter="url(#soft)" opacity=".9"><circle cx="120" cy="700" r="150" fill="${A(t.primary,.5)}"/>`+
        `<ellipse cx="120" cy="700" rx="235" ry="52" fill="none" stroke="${A(t.accent,.7)}" stroke-width="9" transform="rotate(-18 120 700)"/></g>`+
        `<circle cx="1150" cy="150" r="26" fill="${A(t.tertiary,.85)}" filter="url(#soft)"/>`;
  } else if(fl.scenery==='shadow'){
    far=starsField(3,50,A(t.accent,.6),1.3);
    mid=hillBand(430,26,shade(t.tertiary,-.4),0.4,.5)+hillBand(520,32,shade(t.secondary,-.2),2.1,.7);
    // torches glow
    near=`<circle cx="120" cy="470" r="60" fill="${A(t.accent,.28)}" filter="url(#blurBig)"/>`+
         `<circle cx="1160" cy="520" r="70" fill="${A(t.accent,.24)}" filter="url(#blurBig)"/>`;
  } else if(fl.scenery==='candy'){
    // rainbow arc top
    const rb=['#ff8fc7','#ffcf8f','#fff59a','#a6f5b5','#9ad7ff','#c9a3ff'];let rain='';
    rb.forEach((col,i)=>{rain+=`<circle cx="330" cy="470" r="${310-i*20}" fill="none" stroke="${col}" stroke-width="18" opacity=".7"/>`;});
    far=`<clipPath id="th"><rect width="${W}" height="380"/></clipPath><g clip-path="url(#th)">${rain}</g>`;
    mid=hillBand(470,26,shade(t.secondary,.4),0.4,.75)+hillBand(560,32,shade(t.tertiary,.3),2.1,.85);
    near=cloud(1060,120,1.05,A('#fff',.9))+cloud(210,150,0.8,A('#fff',.82))+cloud(700,90,0.7,A('#fff',.7));
  } else if(fl.scenery==='sea'){
    sky+=`<circle cx="1060" cy="130" r="150" fill="${A('#eafcff',.45)}" filter="url(#blurBig)"/>`;
    // sea horizon + waves
    far=`<rect y="360" width="${W}" height="${H-360}" fill="${A(shade(t.primary,.28),.55)}"/>`;
    let waves='';for(let r=0;r<5;r++){for(let x=40;x<W;x+=150){const y=430+r*62+((x/150)%2)*10;waves+=`<path d="M${x-22},${y} q22,-13 44,0" fill="none" stroke="${A('#ffffff',.28)}" stroke-width="3"/>`;}}
    mid=waves;
    near=cloud(1080,120,1.0,A('#fff',.85))+cloud(240,140,0.75,A('#fff',.75));
  } else { // hills
    sky+=`<circle cx="1080" cy="130" r="160" fill="${A('#fff8d0',.45)}" filter="url(#blurBig)"/>`;
    far=`<path d="M0 320 L200 200 L380 300 L560 210 L760 310 L960 220 L1180 305 L1280 250 L1280 420 L0 420 Z" fill="${A(shade(t.primary,.35),.6)}"/>`;
    mid=hillBand(450,26,shade(t.primary,.28),0.4,.85)+hillBand(540,32,shade(t.primary,.12),2.1,.9);
  }
  const partKind = fl.part;
  return sceneryDefs(c)+sky+far+mid+near+particles(partKind,c);
}

/* ============================ HUD ============================ */
function hudHTML(title,sub){
  return `<a class="gear" href="#/user" title="הגדרות">⚙️</a>
    <div class="pill coin"><span class="ic">🪙</span> 1,240</div>
    <div class="titlewrap"><h1>${title}</h1><p>${sub}</p></div>
    <div class="pill"><span class="ic">⭐</span> 8 / 24</div>`;
}

/* ============================ OVERVIEW · DIR 2 — ADVENTURE BOARD ============================ */
const BOARD_POS=[
  {x:250,y:150},{x:520,y:230},{x:800,y:150},{x:1030,y:250},
  {x:960,y:470},{x:660,y:410},{x:380,y:470},{x:200,y:360},
];
function renderBoard(key){
  const t=THEMES[key],fl=FL[key];
  document.getElementById('hud').innerHTML=hudHTML(fl.oTitle,'מסע על לוח ההרפתקאות');
  const c={primary:t.primary,secondary:t.secondary,tertiary:t.tertiary,accent:t.accent,ink:t.ink};
  const light=t.light;
  const VW=1160,VH=560;
  const sx=x=>x*VW/1280, sy=y=>y*VH/620;
  const pos=BOARD_POS.map(p=>({x:sx(p.x),y:sy(p.y)}));
  const curIdx=WORLDS.findIndex(w=>w.state==='current');

  // board surface
  const boardFill=light
    ? `<stop offset="0" stop-color="${shade(t.tertiary,.6)}"/><stop offset="100%" stop-color="${shade(t.primary,.5)}"/>`
    : `<stop offset="0" stop-color="${shade(t.secondary,.25)}"/><stop offset="100%" stop-color="${shade(t.primary,-.1)}"/>`;

  // winding lane (dotted footpath) through positions
  let lane='',laneGlow='';
  for(let i=0;i<pos.length-1;i++){
    const a=pos[i],b=pos[i+1];
    const mx=(a.x+b.x)/2+(b.y-a.y)*0.14,my=(a.y+b.y)/2-30;
    const d=`M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`;
    const passed=i<curIdx;
    lane+=`<path d="${d}" fill="none" stroke="${passed?A(t.accent,.95):A(light?'#3a3a3a':'#ffffff',.30)}" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 15"/>`;
    if(passed)laneGlow+=`<path d="${d}" fill="none" stroke="${A(t.accent,.5)}" stroke-width="16" stroke-linecap="round" filter="url(#bsoft)"/>`;
  }

  // region tokens
  let tokens='';
  pos.forEach((p,i)=>{
    const wd=WORLDS[i],st=wd.state;
    const done=st==='done',cur=st==='current',locked=st==='locked';
    const R=44;
    const tileTop=locked?'#b7bcc4':shade(t.tertiary,.35), tileBot=locked?'#7f858e':t.primary;
    let g=`<g transform="translate(${p.x},${p.y})">`;
    g+=`<ellipse cx="0" cy="${R+8}" rx="${R*0.9}" ry="10" fill="rgba(0,0,0,.22)"/>`;
    // rounded region pad (hexish rounded square) — not an island, a board tile
    if(cur)g+=`<circle r="${R+13}" fill="none" stroke="${A(t.accent,.9)}" stroke-width="4"><animate attributeName="r" values="${R+7};${R+16};${R+7}" dur="1.7s" repeatCount="indefinite"/><animate attributeName="opacity" values=".9;.15;.9" dur="1.7s" repeatCount="indefinite"/></circle>`;
    g+=`<rect x="${-R}" y="${-R}" width="${R*2}" height="${R*2}" rx="20" fill="url(#tile${i})" stroke="${cur?t.accent:A('#ffffff',.85)}" stroke-width="${cur?4:3}"/>`;
    g+=`<rect x="${-R+4}" y="${-R+4}" width="${R*2-8}" height="${R*2-8}" rx="16" fill="none" stroke="${A('#000',.12)}" stroke-width="1.5"/>`;
    g+=`<ellipse cx="-10" cy="-16" rx="20" ry="11" fill="${A('#fff',locked?.12:.35)}"/>`;
    g+=`<text y="15" font-size="42" text-anchor="middle"${locked?' opacity=".4"':''}>${wd.emoji}</text>`;
    if(locked)g+=`<text y="14" font-size="30" text-anchor="middle">🔒</text>`;
    // number chip
    g+=`<g transform="translate(${R-6},${-R+6})"><circle r="13" fill="${t.accent}" stroke="#fff" stroke-width="2"/><text y="5" font-size="14" font-weight="900" text-anchor="middle" fill="${t.onAccent}">${i+1}</text></g>`;
    if(done){let starr='';for(let k=0;k<3;k++){starr+=`<text x="${-16+k*16}" y="${R-6}" font-size="15" text-anchor="middle" fill="${k<wd.stars?t.accent:A(t.ink,.3)}">★</text>`;}g+=starr;}
    if(cur)g+=`<g transform="translate(0,${-R-20})"><text font-size="30" text-anchor="middle">${fl.hero}<animateTransform attributeName="transform" type="translate" values="0 -3;0 3;0 -3" dur="1.5s" repeatCount="indefinite"/></text></g>`;
    g+=`</g>`;
    // name banner below
    const bw=Math.max(120,wd.name.length*11+26),bx=Math.max(6,Math.min(VW-6-bw,p.x-bw/2)),by=p.y+R+16;
    g+=`<g><rect x="${bx}" y="${by}" width="${bw}" height="26" rx="13" fill="${light?A('#ffffff',.92):A('#000',.5)}" stroke="${A(t.accent,.7)}" stroke-width="1.5"/>`+
       `<text x="${bx+bw/2}" y="${by+18}" font-size="13.5" font-weight="800" text-anchor="middle" fill="${light?t.ink:'#fff'}">${wd.name}</text></g>`;
    tokens+=g;
  });

  // gradient defs for tiles
  let tileDefs='';
  pos.forEach((p,i)=>{const locked=WORLDS[i].state==='locked';
    const a=locked?'#c3c8d0':shade(t.tertiary,.4),b=locked?'#7f858e':shade(t.primary,-.05);
    tileDefs+=`<radialGradient id="tile${i}" cx="38%" cy="30%" r="80%"><stop offset="0" stop-color="${a}"/><stop offset="100%" stop-color="${b}"/></radialGradient>`;});

  // compass + dice corner decor
  const compass=`<g transform="translate(${VW-64},${VH-64})" opacity=".92"><circle r="34" fill="${light?A('#fff',.85):A('#000',.5)}" stroke="${A(t.accent,.7)}" stroke-width="2"/><path d="M0,-26 L7,0 L0,5 L-7,0 Z" fill="${t.accent}"/><path d="M0,26 L7,0 L0,-5 L-7,0 Z" fill="${A(light?'#333':'#fff',.6)}"/><circle r="3" fill="${light?'#333':'#fff'}"/><text y="-38" font-size="11" font-weight="900" text-anchor="middle" fill="${A(light?t.ink:'#fff',.85)}">N</text></g>`;

  const svg=`<svg viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="board" x1="0" y1="0" x2="0.4" y2="1">${boardFill}</linearGradient>
      <filter id="bsoft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5"/></filter>
      <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="${A(light?'#000':'#fff',.06)}"/></pattern>
      ${tileDefs}
    </defs>
    <rect x="6" y="6" width="${VW-12}" height="${VH-12}" rx="30" fill="${A('#000',.25)}" transform="translate(0,8)"/>
    <rect x="6" y="6" width="${VW-12}" height="${VH-12}" rx="30" fill="url(#board)" stroke="${A(t.accent,.5)}" stroke-width="6"/>
    <rect x="16" y="16" width="${VW-32}" height="${VH-32}" rx="22" fill="url(#dots)" stroke="${A('#ffffff',.14)}" stroke-width="2"/>
    <g>${laneGlow}${lane}</g>
    ${tokens}
    ${compass}
  </svg>`;
  document.getElementById('content').innerHTML=`<div class="boardWrap">${svg}</div>`;
}

/* ============================ SCREEN B — QUEST TIMELINE ============================ */
function renderPath(key){
  const t=THEMES[key],fl=FL[key];
  const world=WORLDS.find(w=>w.state==='current');
  document.getElementById('hud').innerHTML=hudHTML(world.name,'המסלול של העולם');
  const curIdx=STEPS.findIndex(s=>s.state==='current');
  const doneCount=STEPS.filter(s=>s.state==='done').length;
  const pct=Math.round(doneCount/STEPS.length*100);

  let steps='';
  STEPS.forEach((s,i)=>{
    const side=i%2===0?'right':'left';
    const st=s.state;
    let body=`<div class="ecard">
        <div class="etype">${TYPE_LABEL[s.type]}</div>
        <div class="ename">${s.name}</div>
        <div class="erow">
          ${st==='done'?starsHTML(s.stars)+'<span class="badge-done">✓ הושלם</span>':''}
          ${st==='current'?'<span class="cta">שחקו עכשיו ▶</span>':''}
          ${st==='locked'?'<span style="opacity:.6;font-weight:800;font-size:12.5px">🔒 נעול</span>':''}
        </div>
      </div>`;
    let node=`<div class="node">${s.icon}${st==='current'?`<span class="heroTok">${fl.hero}</span>`:''}</div>`;
    steps+=`<div class="step ${side} ${st}">
        <div class="bodycell">${body}</div>
        ${node}
      </div>`;
  });

  const spineTop=150, avail=H-spineTop-120;
  const fillPct=(doneCount+0.5)/STEPS.length; // fill to just past last done
  document.getElementById('content').innerHTML=`
    <div class="questScroll"><div class="quest">
      <div class="goalCard">
        <div class="g-emoji">${fl.gGoal}</div>
        <div class="gtext">
          <h2>${world.name}</h2>
          <div class="meter"><i style="width:${pct}%"></i></div>
          <div class="msub">${doneCount} מתוך ${STEPS.length} שלבים הושלמו · היעד 👑 האתגר הגדול</div>
        </div>
      </div>
      <div class="spine">
        <div class="track"></div>
        <div class="fill" style="height:${fillPct*100}%"></div>
      </div>
      ${steps}
      <div class="startTag">▲ ההתחלה</div>
      <a class="backBtn" href="#/adventure" onclick="setState({screen:'overview'});return false;">🗺️ למפת העולמות</a>
    </div></div>`;
}

/* ============================ dispatcher + chrome ============================ */
const STATE={theme:'base',screen:'overview',dir:1};
function apply(){
  const t=THEMES[STATE.theme];
  const r=document.documentElement.style;
  r.setProperty('--primary',t.primary);r.setProperty('--secondary',t.secondary);
  r.setProperty('--tertiary',t.tertiary);r.setProperty('--accent',t.accent);
  r.setProperty('--bg',t.bg);r.setProperty('--bg2',t.bg2);r.setProperty('--ink',t.ink);
  r.setProperty('--muted',t.muted);r.setProperty('--onAccent',t.onAccent);
  r.setProperty('--glowA',A(t.accent,.5));
  const light=t.light;
  r.setProperty('--panel', light?'rgba(255,255,255,.72)':'rgba(28,30,46,.62)');
  r.setProperty('--panelStrong', light?'rgba(255,255,255,.92)':'rgba(34,36,54,.9)');
  r.setProperty('--line', light?'rgba(0,0,0,.12)':'rgba(255,255,255,.14)');
  r.setProperty('--vig', light?'.14':'.4');
  document.body.setAttribute('data-'+(light?'light':'dark'),'');
  document.body.removeAttribute('data-'+(light?'dark':'light'));
  document.getElementById('stage').style.background=`linear-gradient(180deg,${t.bg},${t.bg2})`;
  document.getElementById('bg').innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice">${buildScenery(STATE.theme,STATE.screen)}</svg>`;
  if(STATE.screen==='overview') (STATE.dir===2?renderBoard:renderGallery)(STATE.theme);
  else renderPath(STATE.theme);
  // chrome active states
  document.querySelectorAll('#themeBtns button').forEach(b=>b.classList.toggle('on',b.dataset.theme===STATE.theme));
  document.querySelectorAll('#screenBtns button').forEach(b=>b.classList.toggle('on',b.dataset.screen===STATE.screen));
  document.querySelectorAll('#dirBtns button').forEach(b=>b.classList.toggle('on',+b.dataset.dir===STATE.dir));
  const showDir=STATE.screen==='overview';
  document.getElementById('dirLbl').style.opacity=showDir?'':'.25';
  document.getElementById('dirBtns').style.opacity=showDir?'':'.35';
  document.getElementById('dirBtns').style.pointerEvents=showDir?'':'none';
}
window.setState=function(p){Object.assign(STATE,p);apply();};

// build theme buttons
const tb=document.getElementById('themeBtns');
Object.keys(THEMES).forEach(k=>{const b=document.createElement('button');b.dataset.theme=k;b.textContent=THEMES[k].emoji+' '+THEMES[k].name;b.onclick=()=>setState({theme:k});tb.appendChild(b);});
document.querySelectorAll('#screenBtns button').forEach(b=>b.onclick=()=>setState({screen:b.dataset.screen}));
document.querySelectorAll('#dirBtns button').forEach(b=>b.onclick=()=>setState({dir:+b.dataset.dir}));

// parse hash SYNCHRONOUSLY for screenshots: tokens separated by any of - . / , & _ space
(function initFromHash(){
  const raw=decodeURIComponent((location.hash||'').replace(/^#/,''));
  raw.split(/[-.\/,&_ ]+/).forEach(tok=>{
    const s=tok.toLowerCase();
    if(THEMES[s])STATE.theme=s;
    else if(s==='overview'||s==='worlds')STATE.screen='overview';
    else if(s==='path'||s==='levels')STATE.screen='path';
    else if(s==='1'||s==='d1'||s==='gallery')STATE.dir=1;
    else if(s==='2'||s==='d2'||s==='board')STATE.dir=2;
  });
})();
apply();
</script>
