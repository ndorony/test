<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 310">
  <defs>
    <linearGradient id="col" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aabc9"/><stop offset=".5" stop-color="#5d6d8c"/><stop offset="1" stop-color="#46536e"/>
    </linearGradient>
    <linearGradient id="hous" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb864"/><stop offset=".55" stop-color="#f79f4d"/><stop offset="1" stop-color="#cf7526"/>
    </linearGradient>
    <linearGradient id="anv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fa0bf"/><stop offset="1" stop-color="#46536e"/>
    </linearGradient>
    <pattern id="hz2" width="18" height="14" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
      <rect width="18" height="14" fill="#ffcb44"/><rect width="9" height="14" fill="#333a4e"/>
    </pattern>
  </defs>
  <!-- chamber back -->
  <rect x="62" y="88" width="136" height="150" fill="#252c3f" stroke="#2b3145" stroke-width="3"/>
  <rect x="70" y="96" width="120" height="134" fill="#1a2030"/>
  <!-- base anvil -->
  <rect x="28" y="238" width="204" height="34" rx="8" fill="url(#anv)" stroke="#2b3145" stroke-width="3.5"/>
  <rect x="28" y="258" width="204" height="14" rx="7" fill="url(#hz2)" stroke="#2b3145" stroke-width="3"/>
  <rect x="46" y="230" width="168" height="14" rx="5" fill="#c2cde2" stroke="#2b3145" stroke-width="3"/>
  <!-- feet -->
  <path d="M40 272h34l7 20H33Z" fill="#333a4e" stroke="#2b3145" stroke-width="3" stroke-linejoin="round"/>
  <path d="M186 272h34l7 20h-48Z" fill="#333a4e" stroke="#2b3145" stroke-width="3" stroke-linejoin="round"/>
  <!-- columns -->
  <g stroke="#2b3145" stroke-width="3.5">
    <rect x="40" y="70" width="26" height="172" rx="6" fill="url(#col)"/>
    <rect x="194" y="70" width="26" height="172" rx="6" fill="url(#col)"/>
  </g>
  <g fill="#333a4e">
    <circle cx="53" cy="96" r="3.5"/><circle cx="53" cy="140" r="3.5"/><circle cx="53" cy="184" r="3.5"/>
    <circle cx="207" cy="96" r="3.5"/><circle cx="207" cy="140" r="3.5"/><circle cx="207" cy="184" r="3.5"/>
  </g>
  <!-- top housing -->
  <rect x="24" y="18" width="212" height="60" rx="12" fill="url(#hous)" stroke="#2b3145" stroke-width="3.5"/>
  <path d="M34 24h192v8H34Z" fill="#ffd9a1" opacity=".85"/>
  <g fill="#a85c1c" stroke="#2b3145" stroke-width="2">
    <rect x="42" y="44" width="40" height="7" rx="3.5"/><rect x="42" y="56" width="40" height="7" rx="3.5"/>
  </g>
  <!-- gauge -->
  <circle cx="130" cy="48" r="16" fill="#eef2fa" stroke="#2b3145" stroke-width="3"/>
  <path d="M130 48 121 39" stroke="#e0503c" stroke-width="3" stroke-linecap="round"/>
  <circle cx="130" cy="48" r="3" fill="#2b3145"/>
  <!-- warning beacon -->
  <rect x="176" y="38" width="26" height="26" rx="6" fill="#46536e" stroke="#2b3145" stroke-width="3"/>
  <circle cx="189" cy="51" r="8" fill="#ffcb44" stroke="#2b3145" stroke-width="2.5"/>
  <!-- hose -->
  <path d="M236 52c16 0 16 30 2 44s-12 34-12 56" fill="none" stroke="#2b3145" stroke-width="9" stroke-linecap="round"/>
  <path d="M236 52c16 0 16 30 2 44s-12 34-12 56" fill="none" stroke="#5d6d8c" stroke-width="5" stroke-linecap="round"/>
</svg>
